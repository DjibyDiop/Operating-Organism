name: llm-baremetal CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gnu-efi \
            mtools parted dosfstools grub-pc-bin \
            xz-utils coreutils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate engine training datasets
        run: |
          python3 oo-model-repo/scripts/generate_engine_datasets.py \
            --output /tmp/engine-train-out --seed 42
          # Verify outputs exist and have content
          test -s /tmp/engine-train-out/engine_train.jsonl
          test -s /tmp/engine-train-out/engine_val.jsonl
          echo "[datasets] OK: $(wc -l < /tmp/engine-train-out/engine_train.jsonl) train rows"
          echo "[datasets] OK: $(wc -l < /tmp/engine-train-out/engine_val.jsonl) val rows"
          # Verify halt_prob field is present
          grep -q '"halt_prob"' /tmp/engine-train-out/engine_train.jsonl
          echo "[datasets] halt_prob field verified"


        run: |
          make -C olympe test

      - name: Build oo-guard (release)
        working-directory: oo-guard
        run: cargo build --release

      - name: oo-guard prebuild (C risk scan)
        run: |
          ./oo-guard/target/release/oo-guard prebuild llama2_efi_final.c

      - name: Build firmware (UEFI)
        run: |
          make clean
          make repl

      - name: Build OS-G OO compiler (host tool)
        working-directory: OS-G (Operating System Genesis)
        run: |
          cargo build --features std --bin dplus_compile_oo

      - name: Compile policy.dplus -> OOPOLICY.BIN (strict)
        working-directory: OS-G (Operating System Genesis)
        run: |
          cargo run --features std --bin dplus_compile_oo -- ../policy.dplus ../OOPOLICY.BIN
          test -s ../OOPOLICY.BIN

      - name: Negative policy compile rejects missing @@PROOF
        working-directory: OS-G (Operating System Genesis)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          src = Path('../policy.dplus').read_text(encoding='utf-8')
          out = []
          skip = False
          for line in src.splitlines():
              stripped = line.strip()
              if stripped.lower().startswith('@@proof'):
                  skip = True
                  continue
              if skip and stripped.startswith('@@'):
                  skip = False
              if not skip:
                  out.append(line)
          Path('../policy-missing-proof.dplus').write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY
          if cargo run --features std --bin dplus_compile_oo -- ../policy-missing-proof.dplus ../policy-missing-proof.bin; then
            echo 'ERROR: compile unexpectedly succeeded without @@PROOF' >&2
            exit 1
          fi
          rm -f ../policy-missing-proof.dplus ../policy-missing-proof.bin

      - name: Create no-model boot image
        run: |
          NO_MODEL=1 EFI_BIN=llama2.efi ./create-boot-mtools.sh

      - name: Verify image embeds OO policy artifacts
        run: |
          mdir -i llm-baremetal-boot.img@@1M :: | tee /tmp/mdir-root.txt
          grep -qi 'OOPOLICY.BIN' /tmp/mdir-root.txt
          grep -qi 'OOPOLICY.CRC' /tmp/mdir-root.txt
          grep -qi 'policy.dplus' /tmp/mdir-root.txt

      - name: QEMU smoke + bench (tok/s regression gate)
        run: |
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
          # Run inference smoke and capture serial output
          timeout 120 qemu-system-x86_64 \
            -machine q35 -cpu qemu64 -m 2048 \
            -bios /usr/share/ovmf/OVMF.fd \
            -drive format=raw,file=llm-baremetal-boot.img \
            -serial file:/tmp/oo-bench-serial.txt \
            -display none -nographic 2>/dev/null || true

          # Parse tok/s from serial log
          echo "--- Serial output (last 40 lines) ---"
          tail -40 /tmp/oo-bench-serial.txt 2>/dev/null || echo "(no serial log)"

          # Extract tok/s — if model not present it's 0 (no-model boot), gate at 0
          TOK_S=$(grep -oP '(?<=tok_s=)[0-9]+\.[0-9]+' /tmp/oo-bench-serial.txt 2>/dev/null | tail -1 || echo "0")
          echo "OO_BENCH_TOK_S=${TOK_S}" >> $GITHUB_ENV
          echo "[bench] tok_s=${TOK_S}"

          # Save bench row to artifact
          mkdir -p bench
          SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHA},tok_s=${TOK_S},model=no-model" >> bench/results.csv

      - name: Upload bench artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: oo-bench-${{ github.sha }}
          path: |
            bench/results.csv
            /tmp/oo-bench-serial.txt
          retention-days: 90
